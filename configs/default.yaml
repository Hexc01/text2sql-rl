# Text2SQL RL Training Configuration

model:
  name: "Qwen2.5-Coder-1.5B"
  path: "/home/sssss/models/Qwen2.5-Coder-1.5B"
  max_length: 2048
  torch_dtype: "bfloat16"
  load_in_4bit: false
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

training:
  algorithm: "GRPO"  # GRPO / PPO / DPO
  num_epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 1.0e-5
  warmup_steps: 100
  max_grad_norm: 1.0
  weight_decay: 0.01
  fp16: false
  bf16: true

rl:
  reward_model: "rule-based"  # rule-based / learned
  kl_penalty: 0.1
  clip_range: 0.2
  gamma: 1.0
  num_generations: 2

data:
  train_path: "data/my_text2sql.jsonl"
  val_path: "data/final_dataset.json"
  schema_path: "data/schema.json"
  max_prompt_length: 512
  max_completion_length: 1024

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
  save_steps: 500
  eval_steps: 100
  logging_steps: 10

wandb:
  project: "text2sql-rl"
  enabled: true
